<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy: 开发模式下允许 eval，生产环境应使用更严格的策略 -->
    <!-- 注意：在 Electron 中使用 file:// 协议时，CSP 可能需要调整 -->

    <title>仓库管理系统</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
